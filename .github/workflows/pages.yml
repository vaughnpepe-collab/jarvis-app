name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble public site (allowlist only)
        run: |
          mkdir -p _site
          # Default-deny: publish ONLY these public assets. The prospect list,
          # scraped contacts, outreach copy and tooling are never published.
          for item in index.html overrun.html ui.html .nojekyll CNAME portfolio demos mockups; do
            [ -e "$item" ] && cp -r "$item" _site/ || true
          done
          echo "Published:" && ls -A _site
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - uses: actions/deploy-pages@v4
        id: deployment
